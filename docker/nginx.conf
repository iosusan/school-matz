# docker/nginx.conf — configuración completa standalone
# Montado en /etc/nginx/nginx.conf en el contenedor nginx.
# ─────────────────────────────────────────────────────────────
# Diferencias respecto a scripts/nginx-materiales.conf:
#   - proxy_pass usa "app:8000" (DNS interno de Docker Compose)
#   - rutas de certificados bajo /certs/ (bind mount del host)
# ─────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name materiales.local _;

        # rootCA.pem por HTTP para instalarlo en dispositivos sin confianza aún
        location = /rootCA.pem {
            alias /certs/rootCA.pem;
            default_type application/x-pem-file;
            add_header Content-Disposition 'attachment; filename="rootCA.pem"';
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name materiales.local _;

        ssl_certificate     /certs/materiales.crt;
        ssl_certificate_key /certs/materiales.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /scan/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /static/ {
            proxy_pass       http://app:8000;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
