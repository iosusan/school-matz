# docker-compose.yml
# ─────────────────────────────────────────────────────────────
# Stack de la aplicación (modo multitenant / producción).
# Traefik actúa como reverse proxy y gestiona TLS automáticamente.
#
# Prerrequisito:
#   bash scripts/init-infra.sh
#   docker compose -f docker-compose.infra.yml up -d   # levanta Traefik
#
# Variables requeridas en .env:
#   SECRET_KEY, TENANT_SLUG, BASE_DOMAIN
#   (ver .env.example)
#
# Uso:
#   docker compose up --build -d
#   docker exec -it school-assets-app bash scripts/prepare_root.sh
# ─────────────────────────────────────────────────────────────

services:

  # ── Aplicación FastAPI ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-assets-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Base de datos SQLite — bind mount para acceso desde el host
      - ./data:/app/data
      # Caché de imágenes QR del material
      - qr_cache:/app/static/qr
      # Imágenes QR de carnets de usuario
      - qr_usuarios:/app/static/qr_usuarios
    networks:
      - traefik_public
    # La app NO expone puertos al host; Traefik enruta hacia ella
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      # Ruta basada en subdominio leído desde .env (TENANT_SLUG.BASE_DOMAIN)
      - "traefik.http.routers.school-assets.rule=Host(`${TENANT_SLUG}.${BASE_DOMAIN}`)"
      - "traefik.http.routers.school-assets.entrypoints=websecure"
      - "traefik.http.routers.school-assets.tls.certresolver=letsencrypt"
      - "traefik.http.services.school-assets.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/usuarios')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Volúmenes nombrados ─────────────────────────────────────
volumes:
  qr_cache:
    driver: local
  qr_usuarios:
    driver: local

# ── Red compartida con Traefik ───────────────────────────────
# Creada por scripts/init-infra.sh — no se gestiona aquí
networks:
  traefik_public:
    external: true
