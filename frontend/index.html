<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material del Aula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/custom.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // Aplicar tema antes de renderizar
    (function() {
      var t = localStorage.getItem('app_theme') || 'educamadrid';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .screen { display: none; }
    .screen.active { display: block; }
    #qr-reader { width: 100% !important; }
    #qr-reader-login { width: 100% !important; }
  </style>
</head>
<body class="min-h-screen bg-slate-100">

<!-- ═══════════════════════════════════════════════════
     PANTALLA 0 — LOGIN
═══════════════════════════════════════════════════ -->
<div id="screen-login" class="screen active fade-in max-w-sm mx-auto px-4 py-10">
  <div class="text-center mb-10">
    <div class="text-5xl mb-3">🏫</div>
    <h1 class="text-2xl font-bold text-slate-800">Material del Aula</h1>
    <p class="text-slate-500 text-sm mt-1">Gestión de préstamos</p>
  </div>

  <div class="flex flex-col gap-4">
    <button onclick="iniciarLoginQR()"
      class="w-full py-6 rounded-2xl bg-blue-600 text-white text-xl font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-3">
      <span>🪪</span> ENTRAR CON MI CARNET
    </button>

    <a href="/admin.html"
      class="w-full py-3 rounded-2xl border border-slate-300 text-slate-600 text-base font-medium text-center active:scale-95 transition-transform">
      ⚙️ Administración
    </a>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 0b — ESCÁNER QR DE LOGIN
═══════════════════════════════════════════════════ -->
<div id="screen-login-scanner" class="screen fade-in max-w-sm mx-auto px-4 py-6">
  <button onclick="cancelarLoginScanner()" class="flex items-center gap-1 text-blue-600 mb-4">
    ← Volver
  </button>
  <h2 class="text-xl font-bold text-slate-800 mb-1">Identifícate</h2>
  <p class="text-slate-500 text-sm mb-4">Apunta al QR de tu carnet</p>
  <div id="qr-reader-login" class="rounded-2xl overflow-hidden shadow"></div>
  <p id="scanner-login-error" class="text-red-600 text-sm mt-3 text-center hidden"></p>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 1 — INICIO (tras login)
═══════════════════════════════════════════════════ -->
<div id="screen-inicio" class="screen fade-in max-w-sm mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-xl font-bold text-slate-800">Material del Aula</h1>
      <p id="bienvenida-usuario" class="text-slate-500 text-sm"></p>
    </div>
    <button onclick="cerrarSesionUsuario()"
      class="text-sm text-slate-500 border border-slate-300 px-3 py-1.5 rounded-lg hover:bg-slate-50">
      Salir
    </button>
  </div>

  <div class="flex flex-col gap-4">
    <button onclick="iniciarSacar()"
      class="w-full py-6 rounded-2xl bg-blue-600 text-white text-xl font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-3">
      <span>📤</span> SACAR MATERIAL
    </button>

    <button onclick="iniciarDevolver()"
      class="w-full py-6 rounded-2xl bg-green-600 text-white text-xl font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-3">
      <span>📥</span> DEVOLVER MATERIAL
    </button>

    <button onclick="verPrestados()"
      class="w-full py-5 rounded-2xl bg-slate-600 text-white text-lg font-semibold shadow active:scale-95 transition-transform flex items-center justify-center gap-3">
      <span>📋</span> QUÉ HAY PRESTADO
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 2 — ESCÁNER QR (material)
═══════════════════════════════════════════════════ -->
<div id="screen-scanner" class="screen fade-in max-w-sm mx-auto px-4 py-6">
  <button onclick="cancelarScanner()" class="flex items-center gap-1 text-blue-600 mb-4">
    ← Volver
  </button>
  <h2 id="scanner-title" class="text-xl font-bold text-slate-800 mb-1">Escanear objeto</h2>
  <p id="scanner-subtitle" class="text-slate-500 text-sm mb-4">Apunta al código QR del objeto</p>

  <div id="qr-reader" class="rounded-2xl overflow-hidden shadow"></div>
  <p id="scanner-error" class="text-red-600 text-sm mt-3 text-center hidden"></p>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 3 — CONFIRMACIÓN
═══════════════════════════════════════════════════ -->
<div id="screen-confirm" class="screen fade-in max-w-sm mx-auto px-4 py-10 text-center">
  <div id="confirm-icon" class="text-8xl mb-4">✅</div>
  <h2 id="confirm-title" class="text-2xl font-bold text-slate-800 mb-6"></h2>

  <div class="bg-white rounded-2xl shadow p-5 text-left mb-6 space-y-3">
    <div>
      <span class="text-slate-500 text-sm">Objeto</span>
      <p id="confirm-objeto" class="font-semibold text-slate-800"></p>
      <p id="confirm-codigo" class="text-slate-400 text-sm"></p>
    </div>
    <hr class="border-slate-100"/>
    <div>
      <span class="text-slate-500 text-sm">Persona</span>
      <p id="confirm-usuario" class="font-semibold text-slate-800"></p>
    </div>
    <hr class="border-slate-100"/>
    <div>
      <span class="text-slate-500 text-sm">Hora</span>
      <p id="confirm-hora" class="text-slate-600"></p>
    </div>
  </div>

  <div class="flex flex-col gap-3">
    <button onclick="escanearOtro()"
      class="w-full py-4 rounded-2xl bg-blue-600 text-white font-bold text-lg active:scale-95 transition-transform">
      Escanear otro
    </button>
    <button onclick="goInicio()"
      class="w-full py-3 rounded-2xl border border-slate-300 text-slate-600 font-medium active:scale-95 transition-transform">
      Inicio
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 4 — ERROR
═══════════════════════════════════════════════════ -->
<div id="screen-error" class="screen fade-in max-w-sm mx-auto px-4 py-10 text-center">
  <div class="text-8xl mb-4">❌</div>
  <h2 class="text-2xl font-bold text-slate-800 mb-3">No se pudo registrar</h2>
  <p id="error-msg" class="text-slate-600 mb-8"></p>
  <div class="flex flex-col gap-3">
    <button onclick="reintentar()"
      class="w-full py-4 rounded-2xl bg-blue-600 text-white font-bold text-lg active:scale-95 transition-transform">
      Reintentar
    </button>
    <button onclick="goInicio()"
      class="w-full py-3 rounded-2xl border border-slate-300 text-slate-600 font-medium active:scale-95 transition-transform">
      Inicio
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     PANTALLA 5 — PRÉSTAMOS ACTIVOS
═══════════════════════════════════════════════════ -->
<div id="screen-prestados" class="screen fade-in max-w-sm mx-auto px-4 py-6">
  <button onclick="goInicio()" class="flex items-center gap-1 text-blue-600 mb-4">
    ← Volver
  </button>
  <h2 class="text-xl font-bold text-slate-800 mb-4">Material prestado ahora</h2>
  <div id="prestados-list" class="flex flex-col gap-3"></div>
  <p id="prestados-empty" class="text-slate-400 text-center mt-6 hidden">No hay material prestado</p>
</div>

<!-- ═══════════════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════════════ -->
<script src="/js/api.js"></script>
<script>
  // ── Estado global ──────────────────────────────────
  let modo = null;          // 'sacar' | 'devolver'
  let html5QrCode = null;
  let scannerActivo = false;
  let html5QrCodeLogin = null;
  let scannerLoginActivo = false;

  // ── Sesión de usuario ─────────────────────────────
  function _getUsuarioNombre() {
    const n = sessionStorage.getItem("user_nombre") || "";
    const a = sessionStorage.getItem("user_apellido") || "";
    return `${n} ${a}`.trim();
  }

  function cerrarSesionUsuario() {
    sessionStorage.removeItem("user_token");
    sessionStorage.removeItem("user_nombre");
    sessionStorage.removeItem("user_apellido");
    modo = null;
    pararScanner();
    mostrarScreenSilencioso("screen-login");
    history.replaceState({ screen: "screen-login" }, "", location.pathname);
  }

  window._onUserAuthExpired = () => {
    cerrarSesionUsuario();
  };

  // ── Navegación ────────────────────────────────────
  function mostrarScreenSilencioso(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function mostrarScreen(id) {
    mostrarScreenSilencioso(id);
    history.pushState({ screen: id }, "", location.pathname);
  }

  function goInicio() {
    pararScanner();
    pararLoginScanner();
    modo = null;
    mostrarScreenSilencioso("screen-inicio");
    history.replaceState({ screen: "screen-inicio" }, "", location.pathname);
  }

  function onBackPressed(targetScreen) {
    pararScanner();
    pararLoginScanner();

    if (!targetScreen || targetScreen === "screen-login") {
      mostrarScreenSilencioso("screen-login");
      return;
    }
    if (targetScreen === "screen-inicio") {
      modo = null;
      mostrarScreenSilencioso("screen-inicio");
      return;
    }
    if (targetScreen === "screen-scanner" || targetScreen === "screen-login-scanner") {
      modo = null;
      mostrarScreenSilencioso("screen-inicio");
      history.replaceState({ screen: "screen-inicio" }, "", location.pathname);
      return;
    }
    mostrarScreenSilencioso(targetScreen);
  }

  window.addEventListener("popstate", (e) => {
    onBackPressed(e.state?.screen);
  });

  window.addEventListener("beforeunload", (e) => {
    if (scannerActivo || scannerLoginActivo) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  // ── Login QR ──────────────────────────────────────
  function iniciarLoginQR() {
    document.getElementById("scanner-login-error").classList.add("hidden");
    mostrarScreen("screen-login-scanner");
    arrancarLoginScanner();
  }

  function cancelarLoginScanner() {
    pararLoginScanner();
    mostrarScreenSilencioso("screen-login");
    history.replaceState({ screen: "screen-login" }, "", location.pathname);
  }

  function arrancarLoginScanner() {
    if (scannerLoginActivo) return;
    html5QrCodeLogin = new Html5Qrcode("qr-reader-login");
    scannerLoginActivo = true;
    html5QrCodeLogin.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onQRLoginDetectado,
      () => {}
    ).catch(() => {
      scannerLoginActivo = false;
      const errEl = document.getElementById("scanner-login-error");
      errEl.textContent = "No se pudo acceder a la cámara. Asegúrate de que el navegador tiene permiso.";
      errEl.classList.remove("hidden");
    });
  }

  async function pararLoginScanner() {
    if (html5QrCodeLogin && scannerLoginActivo) {
      try { await html5QrCodeLogin.stop(); } catch (_) {}
      scannerLoginActivo = false;
    }
  }

  async function onQRLoginDetectado(texto) {
    await pararLoginScanner();
    // El QR codifica: https://<domain>/usuario/<uuid4>
    const match = texto.match(/\/usuario\/([0-9a-f\-]{36})$/i);
    const token = match ? match[1] : texto.trim();
    const errEl = document.getElementById("scanner-login-error");
    try {
      const res = await api.loginQR(token);
      sessionStorage.setItem("user_token", res.access_token);
      sessionStorage.setItem("user_nombre", res.nombre);
      sessionStorage.setItem("user_apellido", res.apellido);
      document.getElementById("bienvenida-usuario").textContent =
        `Hola, ${res.nombre} ${res.apellido}`;
      mostrarScreenSilencioso("screen-inicio");
      history.replaceState({ screen: "screen-inicio" }, "", location.pathname);
    } catch (e) {
      errEl.textContent = e.message === "QR no reconocido"
        ? "Carnet no reconocido. Pide al profesor que lo resetee."
        : e.message;
      errEl.classList.remove("hidden");
      setTimeout(() => {
        errEl.classList.add("hidden");
        arrancarLoginScanner();
      }, 3000);
    }
  }

  // ── Flujo SACAR ───────────────────────────────────
  function iniciarSacar() {
    modo = "sacar";
    iniciarScanner("sacar");
  }

  // ── Flujo DEVOLVER ────────────────────────────────
  function iniciarDevolver() {
    modo = "devolver";
    iniciarScanner("devolver");
  }

  // ── Scanner (material) ────────────────────────────
  function iniciarScanner(flujo) {
    document.getElementById("scanner-error").classList.add("hidden");
    if (flujo === "sacar") {
      document.getElementById("scanner-title").textContent = "Sacar material";
      document.getElementById("scanner-subtitle").textContent =
        `Prestando a: ${_getUsuarioNombre()}`;
    } else {
      document.getElementById("scanner-title").textContent = "Devolver material";
      document.getElementById("scanner-subtitle").textContent = "Apunta al código QR del objeto";
    }
    mostrarScreen("screen-scanner");
    arrancarScanner();
  }

  function arrancarScanner() {
    if (scannerActivo) return;
    html5QrCode = new Html5Qrcode("qr-reader");
    scannerActivo = true;
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onQRDetectado,
      () => {}
    ).catch(err => {
      scannerActivo = false;
      document.getElementById("scanner-error").textContent =
        "No se pudo acceder a la cámara. Asegúrate de que el navegador tiene permiso.";
      document.getElementById("scanner-error").classList.remove("hidden");
    });
  }

  async function pararScanner() {
    if (html5QrCode && scannerActivo) {
      try { await html5QrCode.stop(); } catch (_) {}
      scannerActivo = false;
    }
  }

  function cancelarScanner() {
    pararScanner();
    goInicio();
  }

  async function onQRDetectado(texto) {
    await pararScanner();

    const match = texto.match(/(MAT-\d+)/);
    const codigoQr = match ? match[1] : texto;

    try {
      let res;
      if (modo === "sacar") {
        res = await api.salida({ codigo_qr: codigoQr });
        mostrarConfirmacion("salida", res);
      } else {
        res = await api.entrada({ codigo_qr: codigoQr });
        mostrarConfirmacion("entrada", res);
      }
    } catch (e) {
      mostrarError(e.message);
    }
  }

  // ── Confirmación ──────────────────────────────────
  function mostrarConfirmacion(tipo, res) {
    document.getElementById("confirm-icon").textContent = "✅";
    document.getElementById("confirm-title").textContent =
      tipo === "salida" ? "SALIDA REGISTRADA" : "DEVOLUCIÓN REGISTRADA";
    document.getElementById("confirm-objeto").textContent = res.material.descripcion;
    document.getElementById("confirm-codigo").textContent = res.material.codigo_qr;
    document.getElementById("confirm-usuario").textContent =
      `${res.usuario.nombre} ${res.usuario.apellido}`;
    const d = new Date(res.fecha_hora);
    document.getElementById("confirm-hora").textContent =
      d.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" }) +
      " · " + d.toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "numeric" });
    mostrarScreen("screen-confirm");
  }

  function escanearOtro() {
    if (modo === "sacar") {
      iniciarScanner("sacar");
    } else {
      iniciarScanner("devolver");
    }
  }

  // ── Error ─────────────────────────────────────────
  function mostrarError(msg) {
    document.getElementById("error-msg").textContent = msg;
    mostrarScreen("screen-error");
  }

  function reintentar() {
    if (modo === "sacar") {
      iniciarScanner("sacar");
    } else {
      iniciarDevolver();
    }
  }

  // ── Préstamos activos ─────────────────────────────
  async function verPrestados() {
    mostrarScreen("screen-prestados");
    const lista = document.getElementById("prestados-list");
    const empty = document.getElementById("prestados-empty");
    lista.innerHTML = '<p class="text-slate-400 text-center">Cargando…</p>';
    empty.classList.add("hidden");
    try {
      const activos = await api.getActivos();
      lista.innerHTML = "";
      if (!activos.length) { empty.classList.remove("hidden"); return; }
      activos.forEach(p => {
        const d = new Date(p.desde);
        const desde = d.toLocaleDateString("es-ES", { day: "numeric", month: "short" }) +
          " " + d.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
        const card = document.createElement("div");
        card.className = "bg-white rounded-xl shadow-sm border border-slate-200 p-4";
        card.innerHTML = `
          <p class="font-semibold text-slate-800">${p.material.descripcion}</p>
          <p class="text-slate-400 text-xs">${p.material.codigo_qr}</p>
          <div class="mt-2 flex items-center justify-between">
            <span class="text-slate-600 text-sm">👤 ${p.usuario.nombre} ${p.usuario.apellido}</span>
            <span class="text-slate-400 text-xs">${desde}</span>
          </div>`;
        lista.appendChild(card);
      });
    } catch (e) {
      lista.innerHTML = `<p class="text-red-500 text-center">${e.message}</p>`;
    }
  }

  // ── Arranque ──────────────────────────────────────
  (function init() {
    const token = sessionStorage.getItem("user_token");
    if (token) {
      const nombre = sessionStorage.getItem("user_nombre") || "";
      const apellido = sessionStorage.getItem("user_apellido") || "";
      document.getElementById("bienvenida-usuario").textContent =
        nombre ? `Hola, ${nombre} ${apellido}` : "";
      mostrarScreenSilencioso("screen-inicio");
      history.replaceState({ screen: "screen-inicio" }, "", location.pathname);
    } else {
      mostrarScreenSilencioso("screen-login");
      history.replaceState({ screen: "screen-login" }, "", location.pathname);
    }
  })();
</script>
</body>
</html>
