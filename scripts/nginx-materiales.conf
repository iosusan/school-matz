# /etc/nginx/sites-available/materiales
#
# Si nginx no está instalado, ejecutar primero:
#   sudo apt update && sudo apt install -y nginx
#
# Luego instalar esta configuración:
#   sudo cp scripts/nginx-materiales.conf /etc/nginx/sites-available/materiales
#   sudo ln -s /etc/nginx/sites-available/materiales /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name materiales.local;

    # Excepción: el root CA se sirve por HTTP para poder instalarlo
    # en dispositivos que aún no confían en el certificado.
    location = /rootCA.pem {
        alias /home/iosu/projects/school_matz/certs/rootCA.pem;
        default_type application/x-pem-file;
        add_header Content-Disposition 'attachment; filename="rootCA.pem"';
    }

    # Todo lo demás → redirigir a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name materiales.local;

    ssl_certificate     /home/iosu/projects/school_matz/certs/materiales.crt;
    ssl_certificate_key /home/iosu/projects/school_matz/certs/materiales.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Ruta del escáner QR — pasa directamente a FastAPI
    location /scan/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # API REST
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Ficheros estáticos (QR generados)
    location /static/ {
        proxy_pass         http://127.0.0.1:8000;
    }

    # Frontend (todo lo demás)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
