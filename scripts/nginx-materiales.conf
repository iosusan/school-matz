# scripts/nginx-materiales.conf — PLANTILLA
# No instalar directamente. Usar: sudo bash scripts/setup_nginx.sh
#
# Variables sustituidas por setup_nginx.sh:
#   __DOMAIN__       → dominio de la aplicación (ej: materiales.local)
#   __PROJECT_DIR__  → ruta absoluta del proyecto en el host

server {
    listen 80;
    server_name __DOMAIN__;

    # Excepción: el root CA se sirve por HTTP para poder instalarlo
    # en dispositivos que aún no confían en el certificado.
    location = /rootCA.pem {
        alias __PROJECT_DIR__/certs/rootCA.pem;
        default_type application/x-pem-file;
        add_header Content-Disposition 'attachment; filename="rootCA.pem"';
    }

    # Todo lo demás → redirigir a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     __PROJECT_DIR__/certs/app.crt;
    ssl_certificate_key __PROJECT_DIR__/certs/app.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Ruta del escáner QR — pasa directamente a FastAPI
    location /scan/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # API REST
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Ficheros estáticos (QR generados)
    location /static/ {
        proxy_pass         http://127.0.0.1:8000;
    }

    # Frontend (todo lo demás)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
