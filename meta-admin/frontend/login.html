<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta-Admin — Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">

    <div class="text-center mb-7">
      <div class="text-5xl mb-3">🏫</div>
      <h1 class="text-2xl font-bold text-slate-800">Meta-Admin</h1>
      <p class="text-slate-500 text-sm mt-1">Gestión de centros escolares</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
        <input id="f-user" type="text" required autocomplete="username"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input id="f-pass" type="password" required autocomplete="current-password"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <p id="login-error"
        class="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg px-3 py-2 hidden">
      </p>

      <button type="submit" id="login-btn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg
               text-sm font-semibold transition-colors disabled:opacity-50">
        Entrar
      </button>
    </form>

  </div>

  <script src="/js/api.js"></script>
  <script>
    // Si ya hay token válido, ir directo al dashboard
    if (getToken()) location.replace('/dashboard.html');

    const form  = document.getElementById('login-form');
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      errEl.classList.add('hidden');

      const username = document.getElementById('f-user').value.trim();
      const password = document.getElementById('f-pass').value;

      try {
        const res  = await api.login(username, password);
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Credenciales incorrectas');
          return;
        }

        setToken(data.access_token);
        location.replace('/dashboard.html');
      } catch {
        showError('Error de conexión. Verifica que el servidor está activo.');
      } finally {
        btn.disabled = false;
      }
    });

    function showError(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
    }
  </script>
</body>
</html>
