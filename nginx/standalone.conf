# nginx/standalone.conf
# SSL terminator para el modo standalone (materiales.local)
# Redirige HTTP→HTTPS y hace proxy hacia el contenedor app:8000

server {
    listen 80;
    server_name materiales.local _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name materiales.local;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Necesario para que el navegador permita acceso a cámara y micrófono
    add_header Permissions-Policy "camera=*, microphone=*" always;

    # Tamaño máximo de subida (fotos, etc.)
    client_max_body_size 50M;

    # Descarga del certificado CA — para instalar en Android/iOS
    location = /ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="ca.crt"';
    }

    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
